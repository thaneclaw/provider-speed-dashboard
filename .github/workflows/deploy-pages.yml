name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy (1)
        id: retry1
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000
        continue-on-error: true

      - name: Retry deploy (2)
        id: retry2
        if: steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000
        continue-on-error: true

      - name: Fail if all deploy attempts failed
        if: steps.deploy.outcome == 'failure' && steps.retry1.outcome == 'failure' && steps.retry2.outcome == 'failure'
        run: |
          echo "::error::All 3 deploy attempts to GitHub Pages failed"
          exit 1
